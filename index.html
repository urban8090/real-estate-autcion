<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="theme-switch-wrapper">
        <label class="theme-switch" for="checkbox">
            <input type="checkbox" id="checkbox" />
            <div class="slider round"></div>
        </label>
        <span id="theme-text">다크 모드</span>
    </div>
    <div class="glass-container">
        <h1>로또 행운 번호</h1>
        <p class="subtitle">오늘의 행운을 잡으세요! 5세트의 번호가 준비됩니다.</p>
        <div id="lotto-display-area"></div>
        <div class="button-group">
            <button id="generate-btn">번호 생성하기</button>
            <button id="clear-btn" class="secondary-btn">초기화</button>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
