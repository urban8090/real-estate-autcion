<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="theme-switch-wrapper">
        <label class="theme-switch" for="checkbox">
            <input type="checkbox" id="checkbox" />
            <div class="slider round"></div>
        </label>
        <span id="theme-text">Dark Mode</span>
    </div>
    <div class="glass-container">
        <h1>Lotto Fortune</h1>
        <p class="subtitle">Your 5 sets of lucky numbers are ready!</p>
        <div id="lotto-display-area"></div>
        <div class="button-group">
            <button id="generate-btn">Generate 5 Sets</button>
            <button id="clear-btn" class="secondary-btn">Clear</button>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
